<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
    <h1 class="text-center text-3xl my-10 font-bold">Welcome to our calculator</h1>
    <div class="bg-gray-700 h-max w-100 m-auto rounded-xl border-20 border-gray-600">
        <div class="flex justify-between align-center px-3">
                <h2 class="text-center text-2xl font-bold text-white py-3">Calculator</h2>
                <div class="flex items-center ">
                    <div class="w-6 border-2 border-gray-600 bg-gray-500 w-10 h-10"></div>
                    <div class="w-6 border-2 border-gray-600 bg-gray-500 w-10 h-10"></div>
                    <div class="w-6 border-2 border-gray-600 bg-gray-500 w-10 h-10"></div>
                </div>
        </div>
        <div class="w-full  h-1/2 px-3">
            <textarea class=" w-full h-30 border-none text-white bg-gray-800 mb-3 text-3xl p-5" id="text" name="data" value="000" rows="1"></textarea>

        </div>
        <div class="w-full h-1/2 flex gap-3 pb-6 justify-center items-center flex-wrap">
            <button class="btn operator ac">AC</button>
            <button class="btn operator percent calc">%</button>
            <button class="btn operator delete">&#x232B;</button>
            <button class="btn operator divide" calc>/</button>
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator calc">x</button>
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator subtract calc">-</button>
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number" value="3">3</button>
            <button class="btn operator calc">+</button>
            <button class="btn number" value="00">00</button>
            <button class="btn number" value="0">0</button>
            <button class="btn number" value=".">.</button>
            <button class="btn operator equals">=</button>
        </div>

    </div>
    <script src="./script.js" type="module"></script>
</body>
</html>
